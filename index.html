<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JEWELS-AI | Professional AR Video</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* 1. Prevent the Blue Screen by forcing a black background immediately */
    body { margin: 0; font-family: 'Poppins', sans-serif; background: #000; overflow: hidden; }
    
    a-scene { 
        background: #000 !important; 
    }
    
    canvas.a-canvas { 
        background-color: #000 !important; 
    }

    /* UI Panels */
    .button-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; z-index: 100; }
    .plan-button { padding: 14px 28px; font-size: 16px; font-weight: bold; border: none; border-radius: 50px; background: linear-gradient(135deg, #5E0F8B, #9d39d1); color: #fff; cursor: pointer; min-width: 180px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: 0.3s; }
    .plan-button:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no;" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: true, physicallyCorrectLights: true">

    <a-assets>
      <video id="driveVideo" playsinline preload="auto" loop crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target1" mindar-image-target="targetIndex: 0">
      <a-circle 
        id="videoDisplay" 
        radius="0.5" 
        position="0 0 0" 
        visible="false"
        material="shader: chromakey; src: #driveVideo; color: #00FF00; threshold: 0.3; smoothness: 0.05; side: double; transparent: true">
      </a-circle>
    </a-entity>
  </a-scene>

  <div class="button-panel" id="planButtons">
    <button class="plan-button" id="toggleButton">▶️ Play Video</button>
  </div>

  <script>
    // --- CONFIGURATION ---
    const API_KEY = "AIzaSyC35sqqZA1YaxZ-F4PJaDqQpKBxPyMKOzw";
    const FOLDER_ID = "1fDj4lVzWcrXJnIQnljrC4-_SBEEV1dlz";

    const videoEl = document.querySelector('#driveVideo');
    const videoDisplay = document.querySelector('#videoDisplay');
    const buttonsContainer = document.querySelector('#planButtons');
    const toggleButton = document.querySelector('#toggleButton');
    const target = document.querySelector('#target1');
    let isPlaying = false;

    // --- CHROMA KEY SHADER ---
    AFRAME.registerShader('chromakey', {
      schema: {
        src: {type: 'map'},
        color: {type: 'color', default: '#00FF00'},
        threshold: {type: 'number', default: 0.3},
        smoothness: {type: 'number', default: 0.05}
      },
      init: function(data) {
        const videoTexture = new THREE.VideoTexture(data.src);
        this.material = new THREE.ShaderMaterial({
          uniforms: {
            tex: {value: videoTexture},
            keyColor: {value: new THREE.Color(data.color)},
            similarity: {value: data.threshold},
            smoothness: {value: data.smoothness}
          },
          vertexShader: `
            varying vec2 vUv;
            void main() {
              vUv = uv;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform sampler2D tex;
            uniform vec3 keyColor;
            uniform float similarity;
            uniform float smoothness;
            varying vec2 vUv;
            void main() {
              vec4 videoColor = texture2D(tex, vUv);
              float dist = distance(videoColor.rgb, keyColor);
              float dToCenter = distance(vUv, vec2(0.5, 0.5));
              float alpha = smoothstep(similarity, similarity + smoothness, dist);
              if (alpha < 0.1 || dToCenter > 0.5) discard;
              gl_FragColor = vec4(videoColor.rgb, alpha);
            }
          `,
          transparent: true
        });
      }
    });

    // --- GOOGLE DRIVE LOADER ---
    async function loadDriveVideo() {
      try {
        const response = await fetch(`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType='video/mp4'&key=${API_KEY}`);
        const data = await response.json();
        if (data.files && data.files.length > 0) {
          videoEl.src = `https://www.googleapis.com/drive/v3/files/${data.files[0].id}?alt=media&key=${API_KEY}`;
          videoEl.load();
        }
      } catch (e) { console.error("Drive Error", e); }
    }
    loadDriveVideo();

    // --- AR LOGIC ---
    target.addEventListener('targetFound', () => buttonsContainer.style.display = 'block');
    target.addEventListener('targetLost', () => {
      buttonsContainer.style.display = 'none';
      videoEl.pause();
      isPlaying = false;
      videoDisplay.setAttribute('visible', false);
      toggleButton.textContent = "▶️ Play Video";
    });

    toggleButton.addEventListener('click', async () => {
      if (!isPlaying) {
        await videoEl.play();
        isPlaying = true;
        toggleButton.textContent = "⏸ Pause Video";
        // Show video only after it starts playing to avoid black frame
        setTimeout(() => videoDisplay.setAttribute('visible', true), 150);
      } else {
        videoEl.pause();
        isPlaying = false;
        videoDisplay.setAttribute('visible', false);
        toggleButton.textContent = "▶️ Play Video";
      }
    });

    document.addEventListener("contextmenu", (e) => e.preventDefault());
  </script>
</body>
</html>
