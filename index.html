<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JEWELS-AI | Google Drive AR Video</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; font-family: 'Poppins', sans-serif; background: #000; overflow: hidden; }
    .button-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; z-index: 100; }
    .plan-button { padding: 12px 24px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px; background-color: #5E0F8B; color: #fff; cursor: pointer; min-width: 160px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    #status-toast { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); color: white; padding: 8px 15px; border-radius: 5px; font-size: 12px; z-index: 1000; }
  </style>
</head>
<body>

  <div id="status-toast">Initializing Drive Connection...</div>

  <div class="button-panel" id="planButtons">
    <button class="plan-button" id="toggleButton">▶️ Play Video</button>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="driveVideo" playsinline preload="auto" loop crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target1" mindar-image-target="targetIndex: 0">
      <a-circle 
        id="videoDisplay" 
        radius="0.5" 
        position="0 0 0" 
        material="shader: chromakey; src: #driveVideo; color: #00FF00; threshold: 0.3; smoothness: 0.05; side: double; transparent: true">
      </a-circle>
    </a-entity>
  </a-scene>

  <script>
    // --- CONFIGURATION ---
    const API_KEY = "AIzaSyC35sqqZA1YaxZ-F4PJaDqQpKBxPyMKOzw";
    const FOLDER_ID = "1fDj4lVzWcrXJnIQnljrC4-_SBEEV1dlz";
    const videoEl = document.querySelector('#driveVideo');
    const toast = document.querySelector('#status-toast');

    // --- CUSTOM ROUND CHROMA KEY SHADER --- [cite: 1, 4]
    AFRAME.registerShader('chromakey', {
      schema: {
        src: {type: 'map'},
        color: {type: 'color', default: '#00FF00'},
        threshold: {type: 'number', default: 0.3},
        smoothness: {type: 'number', default: 0.05}
      },
      init: function(data) {
        const videoTexture = new THREE.VideoTexture(data.src);
        this.material = new THREE.ShaderMaterial({
          uniforms: {
            tex: {value: videoTexture},
            keyColor: {value: new THREE.Color(data.color)},
            similarity: {value: data.threshold},
            smoothness: {value: data.smoothness}
          },
          vertexShader: `
            varying vec2 vUv;
            void main() {
              vUv = uv;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform sampler2D tex;
            uniform vec3 keyColor;
            uniform float similarity;
            uniform float smoothness;
            varying vec2 vUv;
            void main() {
              vec4 videoColor = texture2D(tex, vUv);
              float dist = distance(videoColor.rgb, keyColor);
              
              // Circle Crop Logic [cite: 1, 4]
              float dToCenter = distance(vUv, vec2(0.5, 0.5));
              
              // Smooth transition for Chroma Key [cite: 4]
              float alpha = smoothstep(similarity, similarity + smoothness, dist);
              
              // If outside circle or too similar to green, discard [cite: 5]
              if (alpha < 0.1 || dToCenter > 0.5) {
                discard;
              }
              gl_FragColor = vec4(videoColor.rgb, alpha);
            }
          `,
          transparent: true
        });
      },
      // Ensure the shader updates if the video source changes [cite: 7]
      update: function(data) {
        if (this.material) {
          this.material.uniforms.similarity.value = data.threshold;
          this.material.uniforms.smoothness.value = data.smoothness;
          this.material.uniforms.keyColor.value = new THREE.Color(data.color);
        }
      }
    });

    // --- GOOGLE DRIVE INTEGRATION ---
    async function loadDriveVideo() {
      try {
        // List files in the specific folder [cite: 8]
        const response = await fetch(
          `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType='video/mp4'&key=${API_KEY}`
        );
        const data = await response.json();

        if (data.files && data.files.length > 0) {
          const fileId = data.files[0].id;
          // Format for direct media streaming from Drive API
          const streamUrl = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`;
          
          videoEl.src = streamUrl;
          videoEl.load();
          toast.textContent = "Video Linked: " + data.files[0].name;
          setTimeout(() => toast.style.display = 'none', 3000);
        } else {
          toast.textContent = "Error: No MP4 found in Drive folder.";
        }
      } catch (error) {
        toast.textContent = "Drive Connection Failed.";
        console.error(error);
      }
    }

    loadDriveVideo();

    // --- UI & PLAYBACK CONTROL ---
    const buttonsContainer = document.querySelector('#planButtons');
    const toggleButton = document.querySelector('#toggleButton');
    const target = document.querySelector('#target1');
    let isPlaying = false;

    target.addEventListener('targetFound', () => {
      buttonsContainer.style.display = 'block';
    });

    target.addEventListener('targetLost', () => {
      buttonsContainer.style.display = 'none';
      videoEl.pause();
      isPlaying = false;
      toggleButton.textContent = "▶️ Play Video";
    });

    toggleButton.addEventListener('click', async () => {
      if (!isPlaying) {
        await videoEl.play();
        isPlaying = true;
        toggleButton.textContent = "⏸ Pause Video";
      } else {
        videoEl.pause();
        isPlaying = false;
        toggleButton.textContent = "▶️ Play Video";
      }
    });

    document.addEventListener("contextmenu", (e) => e.preventDefault());
  </script>
</body>
</html>
