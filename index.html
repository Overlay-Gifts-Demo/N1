<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JEWELS-AI | Fixed Circular AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; font-family: 'Poppins', sans-serif; background: #000; overflow: hidden; }
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .card { padding: 30px; border-radius: 20px; background: rgba(255, 255, 255, 0.1); border: 1px solid #f1c40f; text-align: center; color: white; width: 85%; max-width: 400px; }
    .button-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; z-index: 100; }
    .plan-button { padding: 12px 24px; font-size: 15px; font-weight: bold; border: none; border-radius: 50px; background-color: #f1c40f; color: #000; cursor: pointer; min-width: 160px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.2s; }
    .plan-button:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <div id="overlay">
    <div class="card">
      <h2 style="color:#f1c40f; margin:0;">JEWELS-AI</h2>
      <p id="loadingMsg">Fetching your magic gift...</p>
      <button id="entryBtn" style="display:none;" class="plan-button">START AR</button>
    </div>
  </div>

  <div class="button-panel" id="planButtons">
    <button class="plan-button" id="toggleButton">▶️ Play Video</button>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="plan1Video" playsinline preload="auto" loop crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target1" mindar-image-target="targetIndex: 0">
      <a-circle 
        id="videoDisplay" 
        radius="0.5" 
        position="0 0 0.1" 
        material="shader: center-fit-circle; src: #plan1Video; transparent: true; side: double;">
      </a-circle>
    </a-entity>
  </a-scene>

  <script src="script.js"></script>
</body>
</html>
