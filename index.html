<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JEWELS-AI | Fast AR Video</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
  body { margin: 0; font-family: 'Poppins', sans-serif; background: #000; overflow: hidden; }
  .button-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; z-index: 100; }
  .plan-button { padding: 12px 24px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px; background-color: #5E0F8B; color: #fff; cursor: pointer; min-width: 160px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
  #status-toast { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); color: white; padding: 8px 15px; border-radius: 5px; font-size: 12px; z-index: 1000; }
</style>
</head>

<body>

<div id="status-toast">Initializing...</div>

<div class="button-panel" id="planButtons">
  <button class="plan-button" id="toggleButton">▶️ Play Video</button>
</div>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <video
      id="driveVideo"
      playsinline
      webkit-playsinline
      preload="metadata"
      muted
      crossorigin="anonymous">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target1" mindar-image-target="targetIndex: 0">
    <a-circle
      radius="0.5"
      position="0 0 0"
      material="shader: chromakey; src: #driveVideo; color: #00FF00; threshold: 0.3; smoothness: 0.05; side: double; transparent: true">
    </a-circle>
  </a-entity>

</a-scene>

<script>
/* ===============================
   CONFIG
================================ */
const API_KEY = "AIzaSyC35sqqZA1YaxZ-F4PJaDqQpKBxPyMKOzw";
const FOLDER_ID = "1fDj4lVzWcrXJnIQnljrC4-_SBEEV1dlz";

const videoEl = document.querySelector('#driveVideo');
const toast = document.querySelector('#status-toast');
const buttonsContainer = document.querySelector('#planButtons');
const toggleButton = document.querySelector('#toggleButton');
const target = document.querySelector('#target1');

let isPlaying = false;

/* ===============================
   OPTIMIZED CHROMA KEY SHADER
================================ */
AFRAME.registerShader('chromakey', {
  schema: {
    src: {type: 'map'},
    color: {type: 'color', default: '#00FF00'},
    threshold: {type: 'number', default: 0.3},
    smoothness: {type: 'number', default: 0.05}
  },

  init: function(data) {
    const videoTexture = new THREE.VideoTexture(data.src);

    // PERFORMANCE BOOST
    videoTexture.minFilter = THREE.LinearFilter;
    videoTexture.magFilter = THREE.LinearFilter;
    videoTexture.format = THREE.RGBFormat;

    this.material = new THREE.ShaderMaterial({
      uniforms: {
        tex: {value: videoTexture},
        keyColor: {value: new THREE.Color(data.color)},
        similarity: {value: data.threshold},
        smoothness: {value: data.smoothness}
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D tex;
        uniform vec3 keyColor;
        uniform float similarity;
        uniform float smoothness;
        varying vec2 vUv;

        void main() {
          vec4 videoColor = texture2D(tex, vUv);
          float dist = distance(videoColor.rgb, keyColor);
          float dToCenter = distance(vUv, vec2(0.5, 0.5));
          float alpha = smoothstep(similarity, similarity + smoothness, dist);

          if (alpha < 0.1 || dToCenter > 0.5) discard;

          gl_FragColor = vec4(videoColor.rgb, alpha);
        }
      `,
      transparent: true
    });
  }
});

/* ===============================
   FASTER DRIVE LOADING
================================ */
async function loadDriveVideo() {
  try {
    toast.textContent = "Connecting to Drive...";

    const response = await fetch(
      `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType='video/mp4'&fields=files(id,name)&key=${API_KEY}`
    );

    const data = await response.json();

    if (!data.files || data.files.length === 0) {
      toast.textContent = "No MP4 found.";
      return;
    }

    const fileId = data.files[0].id;
    const streamUrl = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`;

    videoEl.src = streamUrl;

    videoEl.addEventListener("loadeddata", async () => {

      // SHOW FIRST FRAME INSTEAD OF BLACK
      videoEl.currentTime = 0.01;

      toast.textContent = "Video Ready ✔";

      // START AR ONLY AFTER VIDEO READY (MAJOR SPEED BOOST)
      const sceneEl = document.querySelector('a-scene');
      await sceneEl.systems["mindar-image-system"].start();

      setTimeout(() => toast.style.display = "none", 2000);
    });

  } catch (error) {
    toast.textContent = "Drive Connection Failed.";
    console.error(error);
  }
}

/* ===============================
   AR EVENTS
================================ */
target.addEventListener('targetFound', () => {
  buttonsContainer.style.display = 'block';
});

target.addEventListener('targetLost', () => {
  buttonsContainer.style.display = 'none';
  videoEl.pause();
  isPlaying = false;
  toggleButton.textContent = "▶️ Play Video";
});

/* ===============================
   PLAY BUTTON
================================ */
toggleButton.addEventListener('click', async () => {
  if (!isPlaying) {
    try {
      await videoEl.play();
      isPlaying = true;
      toggleButton.textContent = "⏸ Pause Video";
    } catch (err) {
      console.error("Playback failed:", err);
    }
  } else {
    videoEl.pause();
    isPlaying = false;
    toggleButton.textContent = "▶️ Play Video";
  }
});

/* ===============================
   SECURITY
================================ */
document.addEventListener("contextmenu", (e) => e.preventDefault());

/* ===============================
   START PROCESS
================================ */
loadDriveVideo();

</script>

</body>
</html>
